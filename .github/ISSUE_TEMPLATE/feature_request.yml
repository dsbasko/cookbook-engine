name: Feature request
description: Suggest a new feature or enhancement for @dsbasko/cookbook-engine.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose an improvement to **@dsbasko/cookbook-engine**!

        Before you continue, please remember that this is a *reusable engine* — one engine,
        many courses. Changes to the public surface (entry-points, `course.yaml` fields,
        export signatures) follow a [SemVer policy](../../blob/main/README.md). Keep that in
        mind when describing your idea, and fill in the fields below as completely as you can.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What's missing or painful today? Describe the use case rather than the implementation.
      placeholder: |
        As a course author, I want to ... so that ...
        Today this is hard/impossible because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see. Be as concrete as you can — API shape, config fields, behavior, examples.
      placeholder: |
        Add a `foo` field to `course.yaml` that ...
        Expose a new entry-point `@dsbasko/cookbook-engine/foo` that ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why did you reject them? Include any workarounds you're using today.
      placeholder: |
        I considered doing X in the consumer's `web/` wrapper, but ...
    validations:
      required: false

  - type: dropdown
    id: breaking-change
    attributes:
      label: Would this be a breaking change per the SemVer policy?
      description: Changing an export signature, removing an entry-point, or removing/renaming a `course.yaml` field is a major (breaking) change. See the SemVer policy in the README.
      options:
        - "No"
        - Possibly
        - "Yes"
    validations:
      required: true

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I have searched the existing [issues](../../issues) and this feature has not already been requested.
          required: true
        - label: I have read the README and confirmed this is not already supported.
          required: false
